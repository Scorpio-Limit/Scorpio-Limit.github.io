<!DOCTYPE html>
<html>
    <head>
        <title>Limit-Report</title>
        <style>
            @keyframes ou {
                0% {
                    opacity: 1;
                }
                100% {
                    transform: translateX(-100px);
                    opacity: 0;
                }
            }
	        ul {
                animation: ou 1s;
                opacity: 0;
		        border-right-style:solid;
                border-top-style:solid;
		        border-width:1px;
		        position: fixed;
		        list-style-type: none;
		        margin: 0;
		        padding: 0;
		        width: 6%;
        		height: 100%;
                margin-top: -20px;
            	background-color: #f1f1f1;
                transition: .5s;
                margin-left: -30px;
        	}
            ul:hover{
               opacity: 1;
               margin-left: 0;
            }
        	li a {
                text-align: center;
        		display: block;
        		color: #000;
        		padding: 8px 16px;
        		text-decoration: #555;
        		transition: all .45s;
	        }
	        li a:hover:not(.active) {
        		background-color: #555;
	        	color: white;
	        	opacity:1;
	        }
            @keyframes show {
                0% {
                    margin-top:-360px; 
                    transform:translateY(30);
                }
                100% {
                    margin-top:0px;  
                }
            }
            body {
                background-color: #8bf7e5;
            }
            div {
                text-align: center;
                color: #252525;
            }
            .one {
                text-shadow: 1.2px 1.2px 0px red, -1.2px -1.2px 0px blue, 6.2px 6.2px 2.2px #3c3c3c;
            }
            button {
                background-color: #c8a6f0;
                border-radius: 20px;
                box-shadow: 2px 2px 1px #3c3c3c;
            }
            button:hover {
                background-color: #a15fec;
            }
            table {
                border-radius: 10px;
                background-color:#9aecd1;
                animation: show 1.2s;
                margin-top: 0px;
            }
            tr {
                text-align: center;
            }
            td {
                border-radius: 10px;
                font-size: 25px;
                text-align: center;
            }
            a {
                color: rgb(28, 146, 214);
                text-decoration: none;
            }
            a:hover {
                color: rgb(141, 63, 230);
            }
        </style>
    </head>

		    <ul>
			    <a><img src = "https://cdn.luogu.com.cn/upload/usericon/532992.png" width="100%" style="border-radius:12px;" ></a>
